<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 28px 'Times New Roman', serif; fill: #0f172a; }
      .label { font: 700 20px 'Times New Roman', serif; fill: #0f172a; }
      .text { font: 400 17px 'Times New Roman', serif; fill: #111827; }
      .entity { fill: #dbeafe; stroke: #334155; stroke-width: 2.5; rx: 14; ry: 14; }
      .process { fill: #dcfce7; stroke: #334155; stroke-width: 2.5; rx: 80; ry: 80; }
      .store { fill: #fef3c7; stroke: #334155; stroke-width: 2.5; }
      .arrow { stroke: #334155; stroke-width: 3.5; fill: none; marker-end: url(#arrow); }
      .flow { font: 400 15px 'Times New Roman', serif; fill: #475569; }
    </style>
  </defs>

  <rect x="0" y="0" width="1400" height="900" fill="#f8fafc"/>
  <text x="700" y="55" text-anchor="middle" class="title">Figure 4.2: Data Flow Diagram for Profile Analysis</text>

  <rect x="70" y="360" width="180" height="90" class="entity"/>
  <text x="160" y="412" text-anchor="middle" class="label">Student</text>

  <rect x="320" y="130" width="220" height="90" class="entity"/>
  <text x="430" y="182" text-anchor="middle" class="label">Frontend</text>

  <ellipse cx="700" cy="180" rx="125" ry="70" class="process"/>
  <text x="700" y="186" text-anchor="middle" class="label">Flask API</text>

  <ellipse cx="700" cy="380" rx="125" ry="70" class="process"/>
  <text x="700" y="386" text-anchor="middle" class="label">Parser</text>

  <ellipse cx="700" cy="600" rx="125" ry="70" class="process"/>
  <text x="700" y="606" text-anchor="middle" class="label">Classifier</text>

  <ellipse cx="1030" cy="380" rx="150" ry="75" class="process"/>
  <text x="1030" y="374" text-anchor="middle" class="label">Skill Gap</text>
  <text x="1030" y="402" text-anchor="middle" class="label">Analyzer</text>

  <rect x="1120" y="130" width="210" height="90" class="entity"/>
  <text x="1225" y="182" text-anchor="middle" class="label">Result View</text>

  <rect x="1010" y="575" width="240" height="80" class="store"/>
  <text x="1130" y="608" text-anchor="middle" class="label">Skill Rules /</text>
  <text x="1130" y="635" text-anchor="middle" class="label">Domain Mapping</text>

  <path d="M 250 405 L 320 175" class="arrow"/>
  <text x="250" y="255" class="flow">resume text input</text>

  <path d="M 540 175 L 575 180" class="arrow"/>
  <text x="548" y="155" class="flow">analyze request</text>

  <path d="M 700 250 L 700 310" class="arrow"/>
  <text x="716" y="285" class="flow">validated text</text>

  <path d="M 700 450 L 700 530" class="arrow"/>
  <text x="716" y="500" class="flow">parsed features</text>

  <path d="M 825 600 L 900 430" class="arrow"/>
  <text x="835" y="505" class="flow">predicted domain</text>

  <path d="M 1010 575 L 1010 455" class="arrow"/>
  <text x="1020" y="515" class="flow">required skills</text>

  <path d="M 880 380 L 850 380" class="arrow"/>
  <text x="860" y="355" class="flow">skills + domain</text>

  <path d="M 1180 305 L 1180 220" class="arrow"/>
  <text x="1190" y="265" class="flow">gap analysis result</text>

  <path d="M 1120 175 L 825 180" class="arrow"/>
  <text x="905" y="155" class="flow">JSON response</text>
</svg>
