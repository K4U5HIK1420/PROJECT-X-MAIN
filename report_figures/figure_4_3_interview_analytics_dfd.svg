<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 28px 'Times New Roman', serif; fill: #0f172a; }
      .label { font: 700 20px 'Times New Roman', serif; fill: #0f172a; }
      .text { font: 400 17px 'Times New Roman', serif; fill: #111827; }
      .entity { fill: #dbeafe; stroke: #334155; stroke-width: 2.5; rx: 14; ry: 14; }
      .process { fill: #dcfce7; stroke: #334155; stroke-width: 2.5; rx: 80; ry: 80; }
      .arrow { stroke: #334155; stroke-width: 3.5; fill: none; marker-end: url(#arrow); }
      .flow { font: 400 15px 'Times New Roman', serif; fill: #475569; }
    </style>
  </defs>

  <rect x="0" y="0" width="1400" height="900" fill="#f8fafc"/>
  <text x="700" y="55" text-anchor="middle" class="title">Figure 4.3: Interview Analytics Processing Flow</text>

  <rect x="80" y="365" width="220" height="90" class="entity"/>
  <text x="190" y="418" text-anchor="middle" class="label">Browser Recorder</text>

  <ellipse cx="480" cy="180" rx="130" ry="72" class="process"/>
  <text x="480" y="186" text-anchor="middle" class="label">Flask API</text>

  <ellipse cx="480" cy="380" rx="130" ry="72" class="process"/>
  <text x="480" y="386" text-anchor="middle" class="label">Whisper</text>

  <ellipse cx="480" cy="620" rx="130" ry="72" class="process"/>
  <text x="480" y="626" text-anchor="middle" class="label">DeepFace</text>

  <ellipse cx="900" cy="380" rx="165" ry="78" class="process"/>
  <text x="900" y="372" text-anchor="middle" class="label">Communication</text>
  <text x="900" y="404" text-anchor="middle" class="label">Analyzer</text>

  <rect x="1110" y="365" width="210" height="90" class="entity"/>
  <text x="1215" y="418" text-anchor="middle" class="label">Output View</text>

  <path d="M 300 410 L 365 215" class="arrow"/>
  <text x="290" y="285" class="flow">recorded interview video</text>

  <path d="M 480 252 L 480 308" class="arrow"/>
  <text x="495" y="285" class="flow">audio stream</text>

  <path d="M 480 452 L 480 548" class="arrow"/>
  <text x="495" y="508" class="flow">sampled frames</text>

  <path d="M 610 380 L 735 380" class="arrow"/>
  <text x="640" y="355" class="flow">transcript + filler words</text>

  <path d="M 610 620 L 840 440" class="arrow"/>
  <text x="680" y="555" class="flow">emotion labels</text>

  <path d="M 1065 410 L 1110 410" class="arrow"/>
  <text x="1060" y="385" class="flow">feedback + score</text>

  <path d="M 1110 410 L 610 180" class="arrow"/>
  <text x="860" y="210" class="flow">result response</text>
</svg>
